<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">Platform map</title>
  <desc id="desc">PC validation project, STM32 migration path, and x86 OS integration path.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fcf7ea"/>
      <stop offset="1" stop-color="#eef8f5"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#13303d" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect width="1200" height="700" rx="40" fill="url(#bg)"/>

  <g font-family="'Space Grotesk', 'Segoe UI', sans-serif">
    <text x="86" y="86" fill="#13222c" font-size="44" font-weight="700" letter-spacing="-1">Platform Integration Map</text>
    <text x="86" y="124" fill="#4f6672" font-size="20">One protocol stack concept with different platform adapters and runtime contexts.</text>
  </g>

  <g filter="url(#shadow)" font-family="'Manrope', 'Segoe UI', sans-serif">
    <g transform="translate(90 190)">
      <rect width="320" height="360" rx="30" fill="#ffffff" stroke="#c9dcdf" stroke-width="2"/>
      <circle cx="66" cy="70" r="34" fill="#0e8b7b"/>
      <path d="M48 66 h36 M54 80 h24 M60 52 h12" stroke="#e3fffb" stroke-width="5" stroke-linecap="round"/>
      <text x="34" y="138" fill="#13222c" font-size="34" font-weight="800">PC Validation</text>
      <text x="34" y="186" fill="#4f6672" font-size="20" font-weight="600">pcap / Npcap host NIC access</text>
      <text x="34" y="220" fill="#4f6672" font-size="20" font-weight="600">CMake + Visual Studio flow</text>
      <text x="34" y="254" fill="#4f6672" font-size="20" font-weight="600">HTTPD, TFTP, Echo test paths</text>
      <text x="34" y="288" fill="#4f6672" font-size="20" font-weight="600">Primary local debug entry</text>
    </g>

    <g transform="translate(440 190)">
      <rect width="320" height="360" rx="30" fill="#fff7e4" stroke="#eec56b" stroke-width="2"/>
      <circle cx="66" cy="70" r="34" fill="#d78611"/>
      <path d="M49 52 h34 v34 h-34 z M57 43 v9 M75 43 v9 M57 86 v9 M75 86 v9" stroke="#fff7df" stroke-width="4" fill="none" stroke-linecap="round"/>
      <text x="34" y="138" fill="#13222c" font-size="34" font-weight="800">STM32F407</text>
      <text x="34" y="186" fill="#4f6672" font-size="20" font-weight="600">LAN8720 Ethernet path</text>
      <text x="34" y="220" fill="#4f6672" font-size="20" font-weight="600">Keil project references</text>
      <text x="34" y="254" fill="#4f6672" font-size="20" font-weight="600">Embedded platform adaptation</text>
      <text x="34" y="288" fill="#4f6672" font-size="20" font-weight="600">Migration-oriented code split</text>
    </g>

    <g transform="translate(790 190)">
      <rect width="320" height="360" rx="30" fill="#ebf4ff" stroke="#a8c9e6" stroke-width="2"/>
      <circle cx="66" cy="70" r="34" fill="#2a6ca0"/>
      <path d="M48 72 c8 -20 24 -20 32 0 M48 72 c8 20 24 20 32 0 M46 72 h36 M64 48 v48" fill="none" stroke="#e6f5ff" stroke-width="4" stroke-linecap="round"/>
      <text x="34" y="138" fill="#13222c" font-size="34" font-weight="800">x86 OS Path</text>
      <text x="34" y="186" fill="#4f6672" font-size="20" font-weight="600">QEMU runtime target</text>
      <text x="34" y="220" fill="#4f6672" font-size="20" font-weight="600">RTL8139 NIC adaptation</text>
      <text x="34" y="254" fill="#4f6672" font-size="20" font-weight="600">Socket syscall integration</text>
      <text x="34" y="288" fill="#4f6672" font-size="20" font-weight="600">Teaching OS compatibility work</text>
    </g>
  </g>

  <g fill="none" stroke="#152d3a" stroke-width="3" opacity="0.3" stroke-dasharray="10 10">
    <path d="M410 360 C425 340 425 340 440 360"/>
    <path d="M760 360 C775 340 775 340 790 360"/>
  </g>
</svg>
