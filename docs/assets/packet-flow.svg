<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Packet processing flow</title>
  <desc id="desc">Frame input to protocol parsing and application socket interfaces.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f7f2e3"/>
      <stop offset="1" stop-color="#eef8ff"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#0e8b7b"/>
    </marker>
  </defs>

  <rect width="1200" height="620" rx="40" fill="url(#bg)"/>

  <g font-family="'Space Grotesk', 'Segoe UI', sans-serif">
    <text x="84" y="84" fill="#13222c" font-size="44" font-weight="700" letter-spacing="-1">Packet Flow in PC Runtime</text>
    <text x="84" y="122" fill="#4f6672" font-size="20">Inbound frames and outbound socket actions share a traceable pipeline.</text>
  </g>

  <g font-family="'Manrope', 'Segoe UI', sans-serif" font-size="24" font-weight="700">
    <g fill="#ffffff" stroke="#c9dbdf" stroke-width="2">
      <rect x="72" y="230" width="190" height="82" rx="22"/>
      <rect x="302" y="230" width="170" height="82" rx="22"/>
      <rect x="512" y="230" width="180" height="82" rx="22"/>
      <rect x="732" y="230" width="190" height="82" rx="22"/>
      <rect x="962" y="230" width="166" height="82" rx="22"/>
    </g>

    <text x="110" y="282" fill="#13222c">NIC / pcap</text>
    <text x="352" y="282" fill="#13222c">netif</text>
    <text x="564" y="282" fill="#13222c">exmsg</text>
    <text x="770" y="282" fill="#13222c">Ether + IPv4</text>
    <text x="989" y="282" fill="#13222c">TCP/UDP/RAW</text>
  </g>

  <g fill="none" stroke="#0e8b7b" stroke-width="4" marker-end="url(#arrow)">
    <path d="M262 271 H296"/>
    <path d="M472 271 H506"/>
    <path d="M692 271 H726"/>
    <path d="M922 271 H956"/>
  </g>

  <g font-family="'Manrope', 'Segoe UI', sans-serif">
    <rect x="318" y="386" width="560" height="90" rx="26" fill="#142f3d"/>
    <text x="362" y="442" fill="#e8fffb" font-size="30" font-weight="800">Application read/write via socket API</text>

    <path d="M598 314 V380" fill="none" stroke="#d78611" stroke-width="4" stroke-dasharray="8 10"/>
    <path d="M628 380 V314" fill="none" stroke="#d78611" stroke-width="4" stroke-dasharray="8 10" opacity="0.5"/>
  </g>

  <path d="M84 540 C300 490 440 570 640 520 C810 478 970 492 1120 548" fill="none" stroke="#d78611" stroke-width="3" opacity="0.36"/>
</svg>
