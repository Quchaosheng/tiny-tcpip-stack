<svg xmlns="http://www.w3.org/2000/svg" width="960" height="640" viewBox="0 0 960 640" role="img" aria-labelledby="title desc">
  <title id="title">TCP/IP 协议栈分层架构</title>
  <desc id="desc">展示应用层、Socket API、传输层、网络层、链路层、平台适配层之间的关系。</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8f1df"/>
      <stop offset="1" stop-color="#e8f8f5"/>
    </linearGradient>
    <linearGradient id="layer" x1="0" x2="1">
      <stop offset="0" stop-color="#183b4a"/>
      <stop offset="1" stop-color="#0f6b70"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#17333d" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="960" height="640" rx="34" fill="url(#bg)"/>
  <path d="M40 128 C180 84 230 160 360 114 C488 68 558 82 680 126 C782 163 846 146 920 104" fill="none" stroke="#e0a83a" stroke-width="4" stroke-dasharray="10 12" opacity="0.55"/>
  <g font-family="'Noto Sans SC', 'Microsoft YaHei', sans-serif">
    <text x="72" y="78" fill="#14323c" font-size="34" font-weight="800">协议栈分层视图</text>
    <text x="72" y="112" fill="#49616a" font-size="17">从测试应用到平台网卡驱动，核心模块以消息队列进入单核心协议栈线程。</text>
  </g>
  <g filter="url(#shadow)" font-family="'Noto Sans SC', 'Microsoft YaHei', sans-serif">
    <g transform="translate(100,150)">
      <rect width="760" height="70" rx="22" fill="#fff8e7" stroke="#f0c769" stroke-width="2"/>
      <text x="34" y="43" fill="#14323c" font-size="22" font-weight="800">应用层</text>
      <text x="170" y="43" fill="#49616a" font-size="17">Ping · TFTP · HTTPD · NTP · Echo · Test CLI</text>
    </g>
    <g transform="translate(100,238)">
      <rect width="760" height="70" rx="22" fill="#ffffff" stroke="#c6ddd9" stroke-width="2"/>
      <text x="34" y="43" fill="#14323c" font-size="22" font-weight="800">Socket API</text>
      <text x="198" y="43" fill="#49616a" font-size="17">x_socket · x_send · x_recv · x_bind · x_connect · x_accept</text>
    </g>
    <g transform="translate(100,326)">
      <rect width="760" height="70" rx="22" fill="#effaf7" stroke="#9ed5cb" stroke-width="2"/>
      <text x="34" y="43" fill="#14323c" font-size="22" font-weight="800">传输层</text>
      <text x="170" y="43" fill="#49616a" font-size="17">RAW · UDP · TCP · TCP In/Out · TCP State · TCP Buffer</text>
    </g>
    <g transform="translate(100,414)">
      <rect width="760" height="70" rx="22" fill="#e9f4ff" stroke="#a8cae8" stroke-width="2"/>
      <text x="34" y="43" fill="#14323c" font-size="22" font-weight="800">网络层</text>
      <text x="170" y="43" fill="#49616a" font-size="17">IPv4 · ICMPv4 · DNS · 路由表 · 分片与重组</text>
    </g>
    <g transform="translate(100,502)">
      <rect width="760" height="70" rx="22" fill="url(#layer)"/>
      <text x="34" y="43" fill="#ffffff" font-size="22" font-weight="800">链路与平台</text>
      <text x="190" y="43" fill="#d4fffa" font-size="17">Ethernet · ARP · Netif · pcap/Npcap · LAN8720 · RTL8139</text>
    </g>
  </g>
  <g fill="none" stroke="#14323c" stroke-width="3" opacity="0.28">
    <path d="M480 220 L480 238"/>
    <path d="M480 308 L480 326"/>
    <path d="M480 396 L480 414"/>
    <path d="M480 484 L480 502"/>
  </g>
</svg>
